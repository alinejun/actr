name: CI (Rust)

on:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PROTOC_VERSION: "29.3"

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  # DynClib cannot consume `wit-bindgen c` output (it is wasm-targeted, not
  # portable C ABI), so its hand-written ABI lives in
  # core/framework/src/guest/dynclib_abi.rs. `wit-lint` is the drift guard that
  # keeps that file aligned with the WIT contract. Runs separately and
  # fast-fails before the heavier build / test jobs.
  wit-lint:
    name: WIT shape consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: WIT <-> DynClib ABI drift check
        run: cargo run -p wit-lint --release

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-wasip2 is required for the Component Model guest
          # fixture rebuilt by core/hyper/tests/wasm_actor_fixture/build.sh
          # under --all-features (wasm-engine).
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      # Phase 1 Component Model toolchain:
      # - wasm-component-ld 0.5.22 is the first release that recognises
      #   wit-bindgen 0.57's async-ABI custom sections; earlier versions
      #   reject the guest fixture with "unknown custom section".
      # - wasm-tools 1.247 is pinned via `cargo install --version` so a
      #   compatible component validator is available for
      #   diagnostics / local inspection.
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Build workspace
        run: cargo build --verbose --all-features
      - name: Build release
        run: cargo build --release --verbose --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      # Phase 1 Component Model toolchain — see `build` job for rationale.
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Run tests
        run: cargo test --workspace --verbose --all-features

  dynclib-e2e:
    name: Dynclib E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run dynclib tests in isolated processes
        run: |
          set -euo pipefail
          # Run each dynclib test in its own process so guest globals cannot
          # leak across tests.
          # dynclib_actor_e2e
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_actor_e2e dynclib_unknown_route_returns_error -- --ignored --exact --nocapture
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_actor_e2e dynclib_echo_returns_payload -- --ignored --exact --nocapture
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_actor_e2e dynclib_double_dispatch -- --ignored --exact --nocapture
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_actor_e2e dynclib_multiple_dispatches -- --ignored --exact --nocapture
          # dynclib_host
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_host test_load_and_instantiate -- --ignored --exact --nocapture
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_host test_basic_echo_dispatch -- --ignored --exact --nocapture
          cargo test -p actr-hyper --features dynclib-engine,test-utils --test dynclib_host test_basic_double_dispatch -- --ignored --exact --nocapture
