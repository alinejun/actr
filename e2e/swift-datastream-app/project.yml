name: DataStreamApp
options:
  bundleIdPrefix: com.actrium
  deploymentTarget:
    iOS: "26.2"
settings:
  base:
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
packages:
  actr-swift:
    path: ../../bindings/swift
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.32.0
schemes:
  DataStreamApp:
    build:
      targets:
        DataStreamApp: all
    run:
      config: Debug


targets:
  DataStreamApp:
    type: application
    platform: iOS
    sources:
      - path: DataStreamApp
      - path: actr.toml
        type: file
        buildPhase: resources
      - path: manifest.lock.toml
        type: file
        buildPhase: resources
      - path: manifest.toml
        type: file
        buildPhase: resources
    dependencies:
      - package: actr-swift
        product: Actr
      - package: swift-protobuf
        product: SwiftProtobuf
    info:
      path: DataStreamApp/Info.plist
      properties:
        CFBundleDisplayName: DataStreamApp
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: DataStreamApp connects to the local actrix development server.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.actrium.DataStreamApp
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        CODE_SIGN_STYLE: Automatic
