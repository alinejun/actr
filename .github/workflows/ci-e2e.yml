name: CI (E2E)

on:
  push:
    branches:
      - codex/harry-e2e-nightly
    paths:
      - ".github/workflows/ci-e2e.yml"
      - "e2e/typescript-stream/**"
      - "e2e/web-browser/**"
  schedule:
    # GitHub Actions cron uses UTC. 18:00 UTC = 02:00 UTC+8 next day.
    - cron: "0 18 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GH_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
  ACTR_E2E_ACTRIX_REPO: https://github.com/Actrium/actrix.git
  ACTR_E2E_ACTRIX_ARTIFACT_REPO: Actrium/actrix
  ACTR_E2E_ACTRIX_ARTIFACT_WORKFLOW: "243491296"
  ACTR_E2E_ACTRIX_ARTIFACT_BRANCH: main
  PROTOC_VERSION: "29.3"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-runtime-echo-e2e:
    name: Package Runtime Echo E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Run package runtime echo e2e
        run: bash e2e/package-runtime-echo/run.sh

  # The standalone Rust echo e2e (`cargo test --test e2e_rust_echo`) was
  # superseded by `package-runtime-echo` once the Rust service template moved
  # to the cdylib + `actr run` packaging model. The dedicated job has been
  # removed; equivalent coverage now lives in the `package-runtime-echo-e2e`
  # job above.

  typescript-e2e:
    name: TypeScript E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr and mock-actrix
        run: |
          cargo build --release -p actr-cli --bin actr --features wasm-engine
          cargo build --release -p actr-mock-actrix --bin mock-actrix
      - name: Run TypeScript stream e2e
        run: bash e2e/typescript-stream/run.sh

  web-browser-e2e:
    name: Web Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof
          google-chrome --version || google-chrome-stable --version || true
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI and mock-actrix
        run: |
          cargo build --release -p actr-cli --bin actr --features wasm-engine
          cargo build --release -p actr-mock-actrix --bin mock-actrix
      - name: Run web browser e2e
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          ACTR_E2E_ACTR_BIN: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          SUITES: BasicFunction
        run: bash e2e/web-browser/run.sh

  swift-e2e:
    name: Swift E2E
    # Pending mock-actrix migration of LocalActrix usage in
    # cli/tests/e2e_swift_echo.rs. Re-enable once the test no longer
    # needs the private Actrix repo.
    if: ${{ vars.ENABLE_SWIFT_E2E == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install macOS e2e dependencies
        run: brew install protobuf xcodegen opus jq sqlite
      - name: Install UniFFI bindgen
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen
      - uses: Swatinem/rust-cache@v2
      - name: Run Swift echo e2e
        run: cargo test -p actr-cli --test e2e_swift_echo -- --ignored --test-threads=1

  python-web-e2e:
    name: Python Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux test deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof netcat-openbsd
          google-chrome --version || google-chrome-stable --version || true
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI (release)
        run: cargo build --release -p actr-cli --bin actr --features wasm-engine
      - name: Run generated Python echo browser e2e
        working-directory: bindings/web/examples/echo
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          PYTHON_SERVER_READY_ATTEMPTS: "1200"
          PYTHON_ECHO_MESSAGE: hello-from-actr-web
        run: bash start-python-mock.sh
