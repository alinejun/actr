name: CI

on:
  push:
    branches: [main, "develop*", "release*"]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, "develop*", "release*"]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actr
        run: git clone --depth=1 https://github.com/Actrium/actr.git ../actr

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --all-features --lib --bins

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actr
        run: git clone --depth=1 https://github.com/Actrium/actr.git ../actr

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: cargo test --workspace --all-features --test '*'

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout actr
        run: git clone --depth=1 https://github.com/Actrium/actr.git ../actr
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actr
        run: git clone --depth=1 https://github.com/Actrium/actr.git ../actr

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - run: cargo clippy --workspace --all-features -- -D warnings

  build:
    name: Build Release (${{ matrix.platform.artifact_name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            artifact_name: actrix-linux-x86_64
            binary_path: target/release/actrix
          - os: macos-14
            artifact_name: actrix-macos-arm64
            binary_path: target/release/actrix
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actr
        run: git clone --depth=1 https://github.com/Actrium/actr.git ../actr

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --all-features

      - name: Upload binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.binary_path }}

  build-release-status:
    name: Build Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Confirm release builds succeeded
        run: echo "All release build matrix jobs completed successfully."

  notify-merge:
    name: Notify WeChat on PR Merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Send WeChat Work notification
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          CONTENT=$(printf '<font color="warning">New PR merged to main branch</font>\n> Project: <font color="comment">%s</font>\n> Issue Author: <font color="comment">%s</font>\n> Issue: <font color="comment">[#%s](%s)</font>\n> Title: <font color="comment">%s</font>\n> MR: <font color="comment">%s</font>' \
            "$REPO" "$PR_AUTHOR" "$PR_NUMBER" "$PR_URL" "$PR_TITLE" "$PR_URL")
          jq -n --arg content "$CONTENT" '{msgtype: "markdown", markdown: {content: $content}}' > /tmp/payload.json
          curl -s --fail -X POST "$WECHAT_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @/tmp/payload.json
