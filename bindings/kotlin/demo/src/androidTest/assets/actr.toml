# actr.toml — linked runtime configuration (instrumentation test)
#
# Package identity and dependencies are declared in manifest.toml.

[system.signaling]
url = "wss://actrix1.develenv.com/signaling/ws"

[system.webrtc]
stun_urls = ["stun:actrix1.develenv.com:3478"]
turn_urls = ["turn:actrix1.develenv.com:3478"]
force_relay = true

[system.deployment]
realm_id = 2368266035

[system.discovery]
visible = true

[system.observability]
filter_level = "debug"
tracing_enabled = false
tracing_endpoint = "http://10.30.3.206:4317"
tracing_service_name = "android-echo-client"

# ACL configuration
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:EchoService:1.0.0"

[[acl.rules]]
permission = "allow"
type = "acme:DataStreamConcurrentServer:1.0.0"
