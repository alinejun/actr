name: Publish TypeScript Package

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Version already committed in package.json and Cargo.toml
        required: true
        type: string
      dry_run:
        description: Validate and package without publishing to npm
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PROTOC_VERSION: "29.3"

jobs:
  preflight:
    name: Preflight TypeScript CI
    uses: ./.github/workflows/ci-typescript.yml

  build-native-packages:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/typescript
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            artifact: actr.darwin-x64.node
            build_args: ""
            use_zig: false
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: actr.darwin-arm64.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-x64-gnu.node
            build_args: ""
            use_zig: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-x64-musl.node
            build_args: "--cross-compile"
            use_zig: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: actr.linux-arm64-gnu.node
            build_args: "--cross-compile"
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: actr.linux-arm64-musl.node
            build_args: "--cross-compile"
            use_zig: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: actr.win32-x64-msvc.node
            build_args: ""
            use_zig: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Setup Zig
        if: ${{ matrix.use_zig }}
        uses: mlugg/setup-zig@v2

      - name: Install dependencies
        run: npm ci

      - name: Build native package
        shell: bash
        run: npx napi build --platform --target ${{ matrix.target }} --release --output-dir artifacts ${{ matrix.build_args }}

      - name: Verify native artifact
        shell: bash
        run: |
          ls -la artifacts
          test -f "artifacts/${{ matrix.artifact }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/typescript/artifacts/${{ matrix.artifact }}
          if-no-files-found: error

  publish-typescript-workload:
    name: Publish bindings/typescript/actr-workload
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript/actr-workload
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/actr-workload/package-lock.json
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Show Node.js and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Validate package name
        run: |
          actual_name="$(node -p "require('./package.json').name")"
          if [ "$actual_name" != "@actrium/actr-workload" ]; then
            echo "Expected package name @actrium/actr-workload, got $actual_name"
            exit 1
          fi

      - name: Validate committed version
        run: |
          actual_version="$(node -p "require('./package.json').version")"
          if [ "$actual_version" != "$EXPECTED_VERSION" ]; then
            echo "Expected version $EXPECTED_VERSION, but repository version is $actual_version"
            exit 1
          fi
          echo "Publishing committed version $EXPECTED_VERSION"
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}

      - name: Verify TypeScript workload WIT drift
        run: cmp ../../../core/framework/wit/actr-workload.wit src/wit/actr-workload.wit

      - name: Build and test package
        run: |
          npm run build
          npm test
          node dist/cli.js bindings /tmp/actr-workload-ts-bindings --wit ../../../core/framework/wit/actr-workload.wit

      - name: Dry run package publish
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run

      - name: Validate npm token
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required when dry_run is false."
            exit 1
          fi
          npm whoami

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if npm view "@actrium/actr-workload@$EXPECTED_VERSION" version >/dev/null 2>&1; then
            echo "@actrium/actr-workload@$EXPECTED_VERSION already exists; skipping"
            exit 0
          fi
          npm publish --access public

      - name: Verify npm package version
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          expected_version="${{ inputs.expected_version }}"
          for attempt in $(seq 1 20); do
            if published_version="$(npm view "@actrium/actr-workload@$expected_version" version 2>/dev/null)" && [ "$published_version" = "$expected_version" ]; then
              echo "@actrium/actr-workload@$expected_version is visible on npm"
              exit 0
            fi
            echo "Waiting for @actrium/actr-workload@$expected_version to become visible on npm (attempt $attempt/20)"
            sleep 15
          done

          echo "Expected @actrium/actr-workload@$expected_version to be visible on npm"
          exit 1

  publish-typescript:
    name: Publish bindings/typescript
    needs:
      - preflight
      - build-native-packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"
          scope: "@actrium"

      - name: Show Node.js and npm versions
        run: |
          node -v
          npm -v

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Validate package name
        run: |
          actual_name="$(node -p "require('./package.json').name")"
          if [ "$actual_name" != "@actrium/actr" ]; then
            echo "Expected package name @actrium/actr, got $actual_name"
            exit 1
          fi

      - name: Validate committed version
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const expectedVersion = process.env.EXPECTED_VERSION;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const cargoToml = fs.readFileSync('Cargo.toml', 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version = "([^"]+)"$/m);
          if (!cargoVersionMatch) {
            throw new Error('Failed to read Cargo.toml version');
          }

          if (packageJson.version !== cargoVersionMatch[1]) {
            throw new Error(
              `Version mismatch: package.json=${packageJson.version}, Cargo.toml=${cargoVersionMatch[1]}`,
            );
          }

          if (packageJson.version !== expectedVersion) {
            throw new Error(
              `Expected version ${expectedVersion}, but repository version is ${packageJson.version}`,
            );
          }

          console.log(`Publishing committed version ${expectedVersion}`);
          EOF
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}

      - name: Show committed version
        run: |
          echo "package.json version: $(node -p "require('./package.json').version")"
          echo "Cargo.toml version: $(grep '^version = ' Cargo.toml | head -n 1)"

      - name: Validate npm token
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required when dry_run is false."
            exit 1
          fi
          npm whoami


      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/typescript/artifacts
          merge-multiple: true

      - name: Prepare TypeScript package
        run: |
          npm run compile:ts
          npx napi create-npm-dirs
          npm run artifacts -- --output-dir artifacts

      - name: Verify native package layout
        run: |
          set -euo pipefail
          for item in \
            "darwin-x64/actr.darwin-x64.node" \
            "darwin-arm64/actr.darwin-arm64.node" \
            "linux-x64-gnu/actr.linux-x64-gnu.node" \
            "linux-x64-musl/actr.linux-x64-musl.node" \
            "linux-arm64-gnu/actr.linux-arm64-gnu.node" \
            "linux-arm64-musl/actr.linux-arm64-musl.node" \
            "win32-x64-msvc/actr.win32-x64-msvc.node"
          do
            test -f "npm/$item"
          done

      - name: Dry run native package publish
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          for dir in npm/*; do
            npm publish "./$dir" --access public --dry-run
          done

      - name: Dry run package publish
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run --ignore-scripts

      - name: Publish native packages to npm
        if: ${{ !inputs.dry_run }}
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in npm/*; do
            package="$(node -p "require('./$dir/package.json').name")"
            if npm view "$package@$EXPECTED_VERSION" version >/dev/null 2>&1; then
              echo "$package@$EXPECTED_VERSION already exists; skipping"
              continue
            fi
            npm publish "./$dir" --access public
          done

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if npm view "@actrium/actr@$EXPECTED_VERSION" version >/dev/null 2>&1; then
            echo "@actrium/actr@$EXPECTED_VERSION already exists; skipping"
            exit 0
          fi
          npm publish --access public --ignore-scripts

      - name: Verify npm package version
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          expected_version="${{ inputs.expected_version }}"
          wait_for_version() {
            local package="$1"
            local expected="$2"
            local attempt
            for attempt in $(seq 1 20); do
              if published_version="$(npm view "$package@$expected" version 2>/dev/null)" && [ "$published_version" = "$expected" ]; then
                echo "$package@$expected is visible on npm"
                return 0
              fi
              echo "Waiting for $package@$expected to become visible on npm (attempt $attempt/20)"
              sleep 15
            done

            echo "Expected $package@$expected to be visible on npm"
            exit 1
          }

          wait_for_version @actrium/actr "$expected_version"
          for package in \
            @actrium/actr-darwin-x64 \
            @actrium/actr-darwin-arm64 \
            @actrium/actr-linux-x64-gnu \
            @actrium/actr-linux-x64-musl \
            @actrium/actr-linux-arm64-gnu \
            @actrium/actr-linux-arm64-musl \
            @actrium/actr-win32-x64-msvc
          do
            wait_for_version "$package" "$expected_version"
          done
