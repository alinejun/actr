name: Release Train (Basic Verify)

on:
  push:
    branches:
      - "*"
    paths:
      - ".github/workflows/release-train-cli-protoc.yml"
      - ".github/workflows/release-train-cli-protoc-verify.yml"
      - "scripts/release-train-cli-protoc.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cli/**"
      - "core/**"
      - "bindings/ffi/**"
      - "bindings/swift/**"
      - "bindings/kotlin/**"
      - "tools/protoc-gen/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/release-train-cli-protoc.yml"
      - ".github/workflows/release-train-cli-protoc-verify.yml"
      - "scripts/release-train-cli-protoc.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "cli/**"
      - "core/**"
      - "bindings/ffi/**"
      - "bindings/swift/**"
      - "bindings/kotlin/**"
      - "tools/protoc-gen/**"

concurrency:
  group: release-train-basic-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROTOC_VERSION: "29.3"

jobs:
  verify:
    name: Verify basic release train dry-run
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CARGO_REGISTRY_TOKEN: dummy-token-for-dry-run
      PYPI_API_TOKEN: dummy-token-for-dry-run
      PACKAGE_SYNC_GITHUB_TOKEN: dummy-token-for-dry-run
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Resolve release train version
        id: version
        run: |
          version=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("Cargo.toml").open("rb") as fh:
              data = tomllib.load(fh)

          print(data["workspace"]["package"]["version"])
          PY
          )
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Run dry-run validation
        run: scripts/release-train-cli-protoc.sh --version "${{ steps.version.outputs.value }}" --dry-run

      - name: Upload dry-run reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: basic-release-train-verify-${{ steps.version.outputs.value }}
          path: release/reports/release-train-v${{ steps.version.outputs.value }}.*
          if-no-files-found: error
