name: CI (E2E)

on:
  schedule:
    # GitHub Actions cron uses UTC. 18:00 UTC = 02:00 UTC+8 next day.
    - cron: "0 18 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GH_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
  ACTR_E2E_ACTRIX_REPO: https://github.com/Actrium/actrix.git
  ACTR_E2E_ACTRIX_ARTIFACT_REPO: Actrium/actrix
  ACTR_E2E_ACTRIX_ARTIFACT_WORKFLOW: "243491296"
  ACTR_E2E_ACTRIX_ARTIFACT_BRANCH: main
  PROTOC_VERSION: "29.3"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-runtime-echo-e2e:
    name: Package Runtime Echo E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl unzip
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Download actrix artifact
        run: bash .github/scripts/download-actrix-artifact.sh actrix-linux-x86_64
      - name: Run package runtime echo e2e
        run: bash e2e/package-runtime-echo/run.sh

  # The standalone Rust echo e2e (`cargo test --test e2e_rust_echo`) was
  # superseded by `package-runtime-echo` once the Rust service template moved
  # to the cdylib + `actr run` packaging model. The dedicated job has been
  # removed; equivalent coverage now lives in the `package-runtime-echo-e2e`
  # job above.

  typescript-e2e:
    name: TypeScript E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y jq lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr and mock-actrix
        run: |
          cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
          cargo build --locked --release -p actr-mock-actrix --bin mock-actrix
      - name: Run TypeScript stream e2e
        run: bash e2e/typescript-stream/run.sh

  web-browser-e2e:
    name: Web Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Linux e2e dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof
          google-chrome --version || google-chrome-stable --version || true
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI and mock-actrix
        run: |
          cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
          cargo build --locked --release -p actr-mock-actrix --bin mock-actrix
      - name: Run web browser e2e
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          ACTR_E2E_ACTR_BIN: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          SUITES: BasicFunction
        run: bash e2e/web-browser/run.sh

  swift-echo-app-e2e:
    name: Swift EchoApp E2E
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('e2e/swift-echo-app/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install macOS e2e dependencies
        run: |
          brew install xcodegen jq sqlite libssh2 pkg-config
          brew link libssh2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Download actrix artifact
        run: bash .github/scripts/download-actrix-artifact.sh actrix-macos-arm64


      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}

      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen

      - name: Build local Swift XCFramework (iOS + macOS)
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: all
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
          echo "ACTR_BINARY_PATH=dist/ActrFFI.xcframework" >> "$GITHUB_ENV"
          echo "ACTR_BINDINGS_PATH=dist/ActrBindings" >> "$GITHUB_ENV"

      - name: Run Swift EchoApp e2e
        env:
          CAPTURE_DIAGNOSTICS_ON_SUCCESS: "1"
        run: bash e2e/swift-echo-app/run.sh

      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-echo-app-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-echo-app/.tmp/sanitized-logs/
          retention-days: 7
          if-no-files-found: warn

  swift-datastream-app-e2e:
    name: Swift DataStreamApp E2E
    runs-on: macos-latest
    timeout-minutes: 240
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('e2e/swift-datastream-app/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install macOS e2e dependencies
        run: |
          brew install xcodegen jq sqlite libssh2 pkg-config
          brew link libssh2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - uses: Swatinem/rust-cache@v2
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Download actrix artifact
        run: bash .github/scripts/download-actrix-artifact.sh actrix-macos-arm64
      - name: Cache uniffi-bindgen binary
        id: cache-uniffi
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen*
          key: uniffi-bindgen-0.31.1-${{ runner.os }}-${{ runner.arch }}
      - name: Install UniFFI bindgen
        if: steps.cache-uniffi.outputs.cache-hit != 'true'
        run: cargo install --locked uniffi --version 0.31.1 --features cli --bin uniffi-bindgen
      - name: Build local Swift XCFramework (iOS + macOS)
        working-directory: bindings/swift
        env:
          ACTR_BUILD_PROFILE: debug
          ACTR_XCFRAMEWORK_TARGETS: all
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ACTR_BINDINGS_PATH=dist/ActrBindings \
          ACTR_BINARY_PATH=dist/ActrFFI.xcframework \
          ./build-xcframework.sh
          echo "ACTR_BINARY_PATH=dist/ActrFFI.xcframework" >> "$GITHUB_ENV"
          echo "ACTR_BINDINGS_PATH=dist/ActrBindings" >> "$GITHUB_ENV"
      - name: Run Swift DataStreamApp e2e
        env:
          CAPTURE_DIAGNOSTICS_ON_SUCCESS: "1"
        run: bash e2e/swift-datastream-app/run.sh
      - name: Upload sanitized diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-datastream-app-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/swift-datastream-app/.tmp/sanitized-logs/
          retention-days: 7
          if-no-files-found: warn

  python-web-e2e:
    name: Python Web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2,wasm32-unknown-unknown
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm Component Model toolchain
        run: |
          cargo install wasm-component-ld --version 0.5.22 --locked
          cargo install wasm-tools --version 1.247.0 --locked
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux test deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update
          sudo apt-get install -y lsof netcat-openbsd
          google-chrome --version || google-chrome-stable --version || true
      - name: Install web binding root deps (puppeteer)
        working-directory: bindings/web
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm install --frozen-lockfile
      - name: Generate CLI web runtime assets
        run: bash bindings/web/scripts/sync-cli-assets.sh --build
      - name: Pre-build actr CLI (release)
        run: cargo build --locked --release -p actr-cli --bin actr --features wasm-engine
      - name: Run generated Python echo browser e2e
        working-directory: bindings/web/examples/echo
        env:
          ACTR_CMD: ${{ github.workspace }}/target/release/actr
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          PYTHON_SERVER_READY_ATTEMPTS: "1200"
          PYTHON_ECHO_MESSAGE: hello-from-actr-web
        run: bash start-python-mock.sh
