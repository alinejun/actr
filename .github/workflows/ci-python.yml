name: CI (Python)

on:
  workflow_call:
  workflow_dispatch:

env:
  PROTOC_VERSION: "29.3"

permissions:
  contents: read

jobs:
  build:
    name: Python Binding Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: bindings/python/pyproject.toml

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Create Python virtualenv
        run: python -m venv .venv

      - name: Install maturin and pytest
        run: .venv/bin/python -m pip install -U maturin pytest

      - name: Build Python binding
        run: .venv/bin/maturin build --manifest-path Cargo.toml

      - name: Install Python binding (editable)
        run: .venv/bin/maturin develop --manifest-path Cargo.toml

      - name: Run smoke tests
        run: .venv/bin/python -m pytest tests/ -v
